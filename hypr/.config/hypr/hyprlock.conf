# INPUT FIELD
input-field {
    monitor =
    size = 200, 50

    outline_thickness = -1
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(0, 0, 0, 0.0)
    inner_color = rgba(0, 0, 0, 0.0)
    font_color = rgb(255, 255, 255)

    fade_on_empty = false
    placeholder_text =
    hide_input = false

    position = 0, 50
    halign = center
    valign = center
}

