$BACKGROUND_PATH = ~/Pictures/Wallpapers/cesar.png

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    disable_loading_bar = false
    hide_cursor = true
    immediate_render = true
}
# BACKGROUND
background {
    monitor =
    path = $BACKGROUND_PATH
    color = rgb(0, 0, 0)
    blur_passes = 2
    brightness = 0.3
}


