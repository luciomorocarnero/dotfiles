$color8 = rgb(333333)          # Gris oscuro (Inactivos)
$color7 = rgb(b0b0b0)          # Gris claro
$color15 = rgb(ffffff)         # Blanco puro (Resaltados)

# Acentos (Escala de grises)
$color1 = rgb(444444)
$color2 = rgb(666666)
$color4 = rgb(888888)
