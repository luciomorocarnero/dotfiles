# --- Paleta de Colores Blanco y Negro ---
$foreground = rgb(e0e0e0)      # Blanco suave (no cansa la vista)
$background = rgba(101010ee)   # Negro profundo con un toque de transparencia
$cursor = rgb(ffffff)

# Variaciones de Grises para la UI
