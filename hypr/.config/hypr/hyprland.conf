# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1

$terminal = kitty
$fileManager = thunar
$menu = rofi -show run
$mainMod = SUPER
$font = "CaskaydiaCove Nerd Font"

exec-once = hyprpm reload -n
exec-once = hypridle
exec-once = waybar &
exec-once = awww-daemon && awww img ~/Pictures/Wallpapers/pinguino.png
exec-once = hyprsunset
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

env = XCURSOR_SIZE,8
env = HYPRCURSOR_SIZE,8
env = EDITOR,nvim

# plugin = /usr/lib/libhy3.so

source = ~/.config/hypr/colors.conf

general {
    gaps_in = 2
    gaps_out = 8

    border_size = 1

    col.active_border = $color15 $color7 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true

    allow_tearing = false
}

# source = ~/.config/hypr/hy3.conf
source = ~/.config/hypr/dwindle.conf
source = ~/.config/hypr/keymaps.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/.env.conf

# Stat Workspace
exec-once = sh -c "kitty --class 'stat-window' btm & sleep 0.2; kitty --class 'stat-window' wiremix & sleep 0.2; kitty --class 'stat-window' bluetui & sleep 0.2; kitty --class 'stat-window' impala & sleep 1; hyprctl dispatch workspace 1"

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 5

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(0,0,0,0.5)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
        special = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          0,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    0,     1.94,  almostLinear, fade
    animation = workspacesIn,  0,     1.21,  almostLinear, fade
    animation = workspacesOut, 0,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

