bind = SUPER, F11, exec, hyprctl dispatch dpms on
bind = SUPER, F12, exec, hyprlock & sleep 3 && hyprctl dispatch dpms off
bind = SUPER SHIFT, F12, exec, hyprlock && systemctl suspend

bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $terminal ~/.tmux/sessions/local.sh
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, V, togglefloating,

# Menus
bind = $mainMod, TAB, exec, rofi -show window -i --no-show-icons -p "Windows" 
bind = $mainMod, Delete, exec, ~/.config/rofi/scripts/powermenu.sh
bind = $mainMod, I, exec, ~/.config/rofi/scripts/icons.sh
bind = $mainMod, code:118, exec, ~/.config/rofi/scripts/hyprsunset.sh
bind = $mainMod, D, exec, rofi -show run -i --no-show-icons -p "Apps"
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Workspaces
$hideSpecialOnChange = ~/.config/hypr/scripts/hide_special_onChange.sh
bind = $mainMod, 1, exec, hyprctl dispatch workspace 1 && $hideSpecialOnChange
bind = $mainMod, 2, exec, hyprctl dispatch workspace 2 && $hideSpecialOnChange
bind = $mainMod, 3, exec, hyprctl dispatch workspace 3 && $hideSpecialOnChange
bind = $mainMod, 4, exec, hyprctl dispatch workspace 4 && $hideSpecialOnChange
bind = $mainMod, 5, exec, hyprctl dispatch workspace 5 && $hideSpecialOnChange
bind = $mainMod, 6, exec, hyprctl dispatch workspace 6 && $hideSpecialOnChange
bind = $mainMod, 7, exec, hyprctl dispatch workspace 7 && $hideSpecialOnChange
bind = $mainMod, 8, exec, hyprctl dispatch workspace 8 && $hideSpecialOnChange
bind = $mainMod, 9, exec, hyprctl dispatch workspace 9 && $hideSpecialOnChange
bind = $mainMod, 0, exec, hyprctl dispatch workspace 0 && $hideSpecialOnChange

bind = $mainMod, code:49, focuscurrentorlast

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special Workspaces
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, F1, togglespecialworkspace , F1
bind = $mainMod, F2, togglespecialworkspace , F2
bind = $mainMod, F3, togglespecialworkspace , F3
bind = $mainMod, F4, togglespecialworkspace , F4
bind = $mainMod, F5, togglespecialworkspace , F5
bind = $mainMod, F6, togglespecialworkspace , F6

bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod SHIFT, F1, movetoworkspace, special:F1
bind = $mainMod SHIFT, F2, movetoworkspace, special:F2
bind = $mainMod SHIFT, F3, movetoworkspace, special:F3
bind = $mainMod SHIFT, F4, movetoworkspace, special:F4
bind = $mainMod SHIFT, F5, movetoworkspace, special:F5
bind = $mainMod SHIFT, F6, movetoworkspace, special:F6

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, F, fullscreen, 1 #fulscreen with waybar
bind = $mainMod SHIFT, F, fullscreen, 0 #fulscreen
bind = $mainMod ALT, F, fullscreen, 0 0 #fulscreen
bind = $mainMod CTRL, F, fullscreenstate, 0 2 #fullsceeenstate of an app but in any window size 

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && pkill -RTMIN+8 waybar
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && dunstify -h string:x-dunst-stack-tag:volume -a "Sistema" "Volumen: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')%" -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && dunstify -h string:x-dunst-stack-tag:volume -a "Sistema" "Volumen: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')%" -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')"
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && dunstify -h string:x-dunst-stack-tag:brightness -a "Sistema" "Brillo: $(brightnessctl i -m | cut -d, -f4)" -h int:value:"$(brightnessctl i -m | cut -d, -f4 | tr -d '%')"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && dunstify -h string:x-dunst-stack-tag:brightness -a "Sistema" "Brillo: $(brightnessctl i -m | cut -d, -f4)" -h int:value:"$(brightnessctl i -m | cut -d, -f4 | tr -d '%')"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ScreenShot
bind = , code:107, exec, ~/.config/rofi/scripts/screenshot.sh
